tags:
  - Itinerary
summary: 更新行程（拖拉排序後儲存）
security:
  - BearerAuth: []
parameters:
  - in: path
    name: itinerary_id
    required: true
    type: string
  - in: body
    name: body
    required: true
    schema:
      type: object
      properties:
        days:
          type: array
          items:
            type: object
        title:
          type: string
responses:
  200:
    description: 更新成功
    schema:
      type: object
      properties:
        message:
          type: string
  404:
    description: 行程不存在或無權限
  401:
    description: 未授權
